# CHP NAS host — Synology DSM + filesystem + process capabilities.
#
# Build the image locally on the NAS first (no registry needed):
#   sudo docker build -f docker/Dockerfile.synology -t chp-nas:latest .
# Then set env (CHP_NAS_KEY, SYNOLOGY_USER, SYNOLOGY_PASSWORD) and:
#   sudo docker compose -f docker-compose.synology.yml up -d
#
# Uses host networking so the synology adapter can reach DSM's WebAPI on :5000.
# Override CHP_NAS_IMAGE only if pulling from a registry instead of a local build.
services:
  chp-nas:
    image: ${CHP_NAS_IMAGE:-chp-nas:latest}
    network_mode: host        # container shares the NAS network → localhost:5000 == DSM
    volumes:
      - /volume1:/volume1
      - chp-nas-data:/var/lib/chp
    environment:
      - CHP_HOST_API_KEY=${CHP_NAS_KEY}
      - SYNOLOGY_URL=http://localhost:5000
      - SYNOLOGY_USER=${SYNOLOGY_USER}
      - SYNOLOGY_PASSWORD=${SYNOLOGY_PASSWORD}
    restart: unless-stopped

volumes:
  chp-nas-data:
