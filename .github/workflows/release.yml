name: Release

# Only fires on bare version tags: v0.2.3, v1.0.0, etc. (NOT rc tags).
# Before pushing a production tag, a matching RC tag (v0.2.3-rc.*) must
# have passed the staging workflow. The verify-staged job enforces this.
#
# Release flow:
#   1. Merge version-bump PR to main
#   2. git tag v0.2.3-rc.1 && git push github v0.2.3-rc.1  → staging.yml
#   3. All staging jobs green
#   4. git tag v0.2.3   && git push github v0.2.3            → this workflow
#   5. verify-staged passes → publish-python + publish-npm + publish-host
#      + publish-adapters (matrix) → create-release
#
# Before first publish of a new package, register it as a PyPI Trusted Publisher:
#   https://pypi.org/manage/project/<package-name>/settings/publishing/
#   Repository: capabilityhostprotocol/chp-core  |  Workflow: release.yml  |  Env: release

on:
  push:
    tags:
      - 'v*.*.*'
      - '!v*.*.*-rc.*'  # RC tags → staging.yml only
    branches-ignore:
      - '**'  # tags only — branch pushes do not trigger release

jobs:
  # ── Guard: a matching RC tag must exist in the repo ──────────────────────
  verify-staged:
    name: Verify RC was staged
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository (full history for tags)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Confirm matching RC tag exists
        run: |
          VERSION="${GITHUB_REF_NAME#v}"   # e.g. 0.2.3
          RC_PATTERN="v${VERSION}-rc.*"
          echo "Looking for RC tags matching: $RC_PATTERN"
          MATCHES=$(git tag --list "$RC_PATTERN")
          if [ -z "$MATCHES" ]; then
            echo ""
            echo "ERROR: No RC tag found for v${VERSION}."
            echo "Push a staging tag first:"
            echo "  git tag v${VERSION}-rc.1 && git push github v${VERSION}-rc.1"
            echo "Then wait for staging.yml to pass before pushing the production tag."
            exit 1
          fi
          echo "Found RC tags: $MATCHES"

  # ── Publish Python to PyPI ────────────────────────────────────────────────
  publish-python:
    name: Publish Python package
    runs-on: ubuntu-latest
    needs: [verify-staged]
    environment: release
    permissions:
      id-token: write  # required for PyPI trusted publishing (OIDC)
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build tools
        run: pip install build

      - name: Build package
        run: python -m build packages/python

      # The exact bytes built here go to BOTH PyPI and the GitHub release —
      # one build per package, so one provenance statement covers both
      # channels (the 0.10.0 lesson: sign what actually ships).
      - name: Upload dist artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist-chp-core
          path: packages/python/dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: packages/python/dist/
          skip-existing: true

  # ── Publish chp-host CLI to PyPI ─────────────────────────────────────────
  publish-host:
    name: Publish chp-host
    runs-on: ubuntu-latest
    needs: [verify-staged]
    environment: release
    permissions:
      id-token: write
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build tools
        run: pip install build

      - name: Build package
        run: python -m build packages/chp-host

      - name: Upload dist artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist-chp-host
          path: packages/chp-host/dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: packages/chp-host/dist/
          skip-existing: true

  # ── Publish chp-adapter-* to PyPI (matrix) ───────────────────────────────
  publish-adapters:
    name: Publish ${{ matrix.adapter }}
    runs-on: ubuntu-latest
    needs: [verify-staged, publish-python]
    environment: release
    permissions:
      id-token: write
    strategy:
      fail-fast: false
      matrix:
        adapter:
          - chp-adapter-http
          - chp-adapter-filesystem
          - chp-adapter-git
          - chp-adapter-audit
          - chp-adapter-secrets
          - chp-adapter-jobs
          - chp-adapter-tailscale
          - chp-adapter-mcp
          - chp-adapter-registry
          - chp-adapter-conformance
          - chp-adapter-github
          - chp-adapter-radicle
          - chp-adapter-ci
          - chp-adapter-process
          - chp-adapter-messages
          - chp-adapter-planning
          - chp-adapter-delegation
          - chp-adapter-safety
          - chp-adapter-composition
          - chp-adapter-huggingface
          - chp-adapter-tei
          - chp-adapter-vllm
          - chp-adapter-scout
          - chp-adapter-sglang
          - chp-adapter-smolagents
          - chp-adapter-local-llm
          - chp-adapter-launchd
          - chp-adapter-synology
          - chp-adapter-raspi
          - chp-adapter-release
          - chp-adapter-mlx
          - chp-adapter-host
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build tools
        run: pip install build

      - name: Build package
        run: python -m build packages/${{ matrix.adapter }}

      # Upload BEFORE publish: an adapter whose PyPI project doesn't exist yet
      # still ships on the GitHub release (its only channel until a trusted
      # publisher is registered — see the header note).
      - name: Upload dist artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist-${{ matrix.adapter }}
          path: packages/${{ matrix.adapter }}/dist/

      - name: Publish to PyPI
        # fail-soft: 16 adapter projects have no PyPI trusted publisher yet;
        # their 403s are expected and must not fail the run or skip the release
        continue-on-error: true
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: packages/${{ matrix.adapter }}/dist/
          skip-existing: true

  # ── Publish TypeScript types to npm ──────────────────────────────────────
  publish-npm:
    name: Publish TypeScript types
    runs-on: ubuntu-latest
    needs: [verify-staged]
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          registry-url: "https://registry.npmjs.org"

      - name: Install dependencies
        working-directory: packages/ts-types
        run: npm ci

      - name: Build
        working-directory: packages/ts-types
        run: npm run build

      - name: Publish to npm
        working-directory: packages/ts-types
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  # ── Create GitHub Release ─────────────────────────────────────────────────
  create-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    # The release is the canonical artifact record — it must exist even when
    # some publish legs fail (their artifacts still attach; PyPI can catch up
    # on a rerun). Only a cancelled run skips it.
    if: ${{ !cancelled() }}
    needs: [publish-python, publish-npm, publish-host, publish-adapters]
    permissions:
      contents: write
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # needed for release notes generation

      - name: Download all dist artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: dist-*
          merge-multiple: true
          path: release-dist/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          make_latest: true
          files: release-dist/*

      - name: Next step reminder
        run: |
          echo 'Release created with all built artifacts.'
          echo 'Finish operator-side (provenance signing, chp-release key custody):'
          echo '  bash scripts/release-finish.sh <version>   # in chp-dev'
