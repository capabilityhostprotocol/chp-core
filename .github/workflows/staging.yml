name: Staging

# Triggered by release-candidate tags: v0.2.3-rc.1, v0.3.0-rc.2, etc.
# All jobs must pass before the production tag (v0.2.3) should be pushed.
#
# Flow:
#   1. git tag v0.2.3-rc.1 && git push github v0.2.3-rc.1  → this workflow
#   2. All jobs green → push production tag:
#        git tag v0.2.3 && git push github v0.2.3  → release.yml

on:
  push:
    tags:
      - 'v*.*.*-rc.*'

jobs:
  # ── Job 1: Full test suite including slow + perf ─────────────────────────
  extended-tests:
    name: Extended tests (slow + perf + stress)
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install package + dev deps
        run: python -m pip install -e "packages/python[dev]"

      - name: Run full test suite (all markers)
        run: |
          python -m pytest packages/python/tests/ -v \
            --cov=packages/python/chp_core --cov-report=term-missing --cov-fail-under=75

      - name: Run stress + performance tests
        run: |
          python -m pytest packages/python/tests/test_stress.py -v \
            --override-ini="addopts=" -m "slow or perf"

      - name: Run conformance suite
        run: python conformance/runner.py

      - name: Validate demo execution
        run: |
          python examples/agent-operations-demo/demo.py >/tmp/chp-agent-demo.out
          python examples/codex-self-observation-demo/demo.py >/tmp/chp-codex-demo.out
          python examples/mcp-bridge-demo/bridge.py >/tmp/chp-mcp-demo.out

      - name: Validate schema JSON
        run: |
          for f in schemas/*.json; do
            python -m json.tool "$f" >/dev/null
          done

      - name: Type check
        run: |
          python -m pip install mypy
          mypy packages/python/chp_core \
            --ignore-missing-imports \
            --no-strict-optional \
            --exclude "/(tests|demo|__pycache__)/"

  # ── Job 2: Concurrent write safety (stress only) ─────────────────────────
  stress-concurrent:
    name: Concurrent write safety
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install package
        run: python -m pip install -e "packages/python[dev]"

      - name: Run concurrent write tests
        run: |
          python -m pytest packages/python/tests/test_stress.py \
            --override-ini="addopts=" \
            -m slow -k "concurrent" -v

  # ── Job 3: Publish to TestPyPI ────────────────────────────────────────────
  publish-testpypi:
    name: Publish to TestPyPI
    runs-on: ubuntu-latest
    needs: [extended-tests, stress-concurrent]
    environment: staging
    permissions:
      id-token: write  # OIDC trusted publishing

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build tools
        run: pip install build

      - name: Build package
        run: python -m build packages/python

      - name: Publish to TestPyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/
          packages-dir: packages/python/dist/
          skip-existing: true

  # ── Job 4: Smoke test against TestPyPI install ────────────────────────────
  smoke-testpypi:
    name: Smoke test (TestPyPI install)
    runs-on: ubuntu-latest
    needs: [publish-testpypi]

    steps:
      - name: Extract version from tag
        id: version
        run: |
          TAG="${GITHUB_REF_NAME}"          # e.g. v0.2.3-rc.1
          VERSION="${TAG#v}"                # e.g. 0.2.3-rc.1
          BASE="${VERSION%-rc.*}"           # e.g. 0.2.3
          echo "version=$BASE" >> "$GITHUB_OUTPUT"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install from TestPyPI (retry for propagation delay)
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          for i in 1 2 3 4 5; do
            pip install \
              --index-url https://test.pypi.org/simple/ \
              --extra-index-url https://pypi.org/simple/ \
              "chp-core==$VERSION" && break
            echo "Attempt $i failed — waiting 30s..."
            sleep 30
          done

      - name: Verify CLI is reachable
        run: chp --help | grep -q "CHP"

      - name: Smoke test PostToolUse hook
        run: |
          STORE=$(mktemp /tmp/chp-smoke-XXXXXX.sqlite)
          echo '{"hook_event_name":"PostToolUse","session_id":"smoke-test","tool_name":"Bash","tool_input":{"command":"echo hi"},"tool_response":{"output":"hi","exit_code":0},"cwd":"/tmp"}' \
            | chp hook post-tool --store "$STORE"
          echo "Hook exit: $?"

      - name: Smoke test PreToolUse hook (pass)
        run: |
          STORE=$(mktemp /tmp/chp-smoke2-XXXXXX.sqlite)
          echo '{"hook_event_name":"PreToolUse","session_id":"smoke-test","tool_name":"Read","tool_input":{"file_path":"/tmp/f"},"cwd":"/tmp"}' \
            | chp hook pre-tool --store "$STORE"
          echo "Pre-tool exit: $?"

      - name: Smoke test PreToolUse hook (block)
        run: |
          STORE=$(mktemp /tmp/chp-smoke3-XXXXXX.sqlite)
          POLICY=$(mktemp /tmp/chp-policy-XXXXXX.json)
          echo '{"version":"1","block_capability_ids":["claude_code.bash"],"block_patterns":[]}' > "$POLICY"
          echo '{"hook_event_name":"PreToolUse","session_id":"smoke-block","tool_name":"Bash","tool_input":{"command":"echo hi"},"cwd":"/tmp"}' \
            | chp hook pre-tool --store "$STORE" --policy "$POLICY"; EXIT=$?
          [ "$EXIT" -eq 2 ] || (echo "Expected exit 2 for blocked hook, got $EXIT" && exit 1)

      - name: Smoke test session commands
        run: |
          STORE=$(mktemp /tmp/chp-smoke4-XXXXXX.sqlite)
          echo '{"hook_event_name":"PostToolUse","session_id":"smoke-session","tool_name":"Read","tool_input":{"file_path":"/tmp/f"},"tool_response":{},"cwd":"/tmp"}' \
            | chp hook post-tool --store "$STORE"
          chp session show smoke-session --store "$STORE" | python -c "import sys,json; d=json.load(sys.stdin); assert d['tool_count']==1"
          chp session export smoke-session --store "$STORE" | python -c "import sys,json; d=json.load(sys.stdin); assert d['format']=='chp-session-bundle/1'"
