name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  python-reference:
    name: Python reference host
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install reference package
        run: python -m pip install -e "packages/python[dev]"

      - name: Run unit tests
        run: python -m unittest discover -s packages/python/tests

      - name: Run conformance
        run: python conformance/runner.py

      - name: Validate demo execution
        run: |
          python examples/agent-operations-demo/demo.py >/tmp/chp-agent-demo.out
          python examples/codex-self-observation-demo/demo.py >/tmp/chp-codex-demo.out
          python examples/mcp-bridge-demo/bridge.py >/tmp/chp-mcp-demo.out

      - name: Validate schema JSON
        run: |
          for f in schemas/*.json; do
            python -m json.tool "$f" >/dev/null
          done
