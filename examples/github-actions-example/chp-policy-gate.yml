name: CHP Policy Gate

# Gate PRs against a CHP policy file stored in the repo.
# Requires: pip install chp-core, a .chp/policy.json in the repo,
# and a CHP_STORE secret (path or URL to the SQLite evidence store).
#
# Usage:
#   1. Add a .chp/policy.json to your repo (see sample-policy.json)
#   2. Set the CHP_STORE secret to the path of your evidence store
#   3. Add this workflow to .github/workflows/

on:
  pull_request:
  push:
    branches: [main]

jobs:
  chp-policy-gate:
    name: CHP policy gate
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install CHP
        run: pip install chp-core

      - name: Lint policy file
        run: chp policy lint .chp/policy.json

      - name: Run CI policy check
        run: |
          chp ci check \
            --policy .chp/policy.json \
            --store "${{ secrets.CHP_STORE || '~/.chp/claude-code-sessions.sqlite' }}"
        # Exit code 1 if any session violates the policy — fails the build.
        # Use --session <id> to check a specific session only.
        # Use --since <ISO_TS> to limit to sessions after a cutoff.
