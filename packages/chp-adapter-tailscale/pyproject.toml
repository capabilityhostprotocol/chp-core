[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "chp-adapter-tailscale"
version = "0.34.0"
description = "CHP adapter — Tailscale mesh networking for multi-host CHP clusters"
requires-python = ">=3.11"
dependencies = ["chp-core"]

[project.entry-points."chp.adapters"]
tailscale = "chp_adapter_tailscale:TailscaleAdapter"

[tool.pytest.ini_options]
asyncio_mode = "strict"
testpaths = ["tests"]
