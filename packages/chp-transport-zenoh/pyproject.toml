[build-system]
requires = ["hatchling>=1.25"]
build-backend = "hatchling.build"

[project]
name = "chp-transport-zenoh"
version = "0.41.0"
description = "CHP transport binding — a Zenoh query/reply + pub/sub data plane (chp-zenoh-binding.md)"
readme = "README.md"
requires-python = ">=3.10"
license = { text = "Apache-2.0" }
authors = [{ name = "Auxo" }]
keywords = ["chp", "capability-host-protocol", "zenoh", "transport", "mesh"]
classifiers = [
    "Development Status :: 3 - Alpha",
    "Intended Audience :: Developers",
    "License :: OSI Approved :: Apache Software License",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Python :: 3.13",
    "Topic :: Software Development :: Libraries :: Python Modules",
]
# The Zenoh binding lives downstream so chp-core stays dependency-free; the
# heavy eclipse-zenoh dep is pulled in ONLY by installing this package.
dependencies = [
    "chp-core>=0.7.0",
    "eclipse-zenoh>=1.0",
]

[project.optional-dependencies]
dev = ["pytest>=8.0"]

[tool.pytest.ini_options]
testpaths = ["tests"]
pythonpath = ["."]

[tool.hatch.build.targets.wheel]
packages = ["chp_transport_zenoh"]
