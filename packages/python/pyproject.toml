[build-system]
requires = ["hatchling>=1.25"]
build-backend = "hatchling.build"

[project]
name = "chp-core"
version = "0.39.0"
description = "Capability Host Protocol — local execution evidence for agents, tools, and systems"
readme = "README.md"
requires-python = ">=3.10"
license = { text = "Apache-2.0" }
authors = [{ name = "Project Auxo, Inc." }]
keywords = ["chp", "capability-host-protocol", "agents", "observability", "governance", "evidence", "replay"]
classifiers = [
    "Development Status :: 3 - Alpha",
    "Intended Audience :: Developers",
    "License :: OSI Approved :: Apache Software License",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Python :: 3.13",
    "Topic :: Software Development :: Libraries :: Python Modules",
    "Topic :: System :: Logging",
    "Topic :: System :: Monitoring",
]
dependencies = []

[project.urls]
Homepage = "https://github.com/capabilityhostprotocol/chp-core"
Documentation = "https://github.com/capabilityhostprotocol/chp-core/tree/main/docs"
Specification = "https://github.com/capabilityhostprotocol/chp-core/tree/main/spec"
Issues = "https://github.com/capabilityhostprotocol/chp-core/issues"

[project.scripts]
chp = "chp_core.cli:main"

[project.entry-points."chp.adapters"]
chp-git = "chp_core.version_control:GitAdapter"

[project.optional-dependencies]
dev     = ["jsonschema>=4.23", "pytest>=8.0", "pytest-cov>=5.0", "pytest-asyncio>=0.21", "hypothesis>=6.0", "cryptography>=41.0"]
signing = ["cryptography>=41.0"]
claude = ["anthropic>=0.30"]
openai = ["openai>=1.0"]
gemini = ["google-generativeai>=0.5"]
models = ["anthropic>=0.30", "openai>=1.0", "google-generativeai>=0.5"]

[tool.pytest.ini_options]
testpaths = ["tests"]
pythonpath = ["."]
addopts = "--cov=packages/python/chp_core --cov-report=term-missing --cov-fail-under=75"
asyncio_mode = "auto"
markers = [
  "integration: tests that touch filesystem, git, or network sockets",
  "slow: tests that take more than 1s",
  "perf: performance contract assertions",
]

[tool.coverage.run]
omit = ["tests/*", "*/demo*", "*/__pycache__/*"]

[tool.coverage.report]
exclude_lines = [
  "pragma: no cover",
  "if __name__ == .__main__.:",
  "raise NotImplementedError",
]

[tool.hatch.build.targets.wheel]
packages = ["chp_core"]
