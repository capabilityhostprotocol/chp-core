[build-system]
requires = ["hatchling>=1.25"]
build-backend = "hatchling.build"

[project]
name = "chp-core"
version = "0.2.1"
description = "Capability Host Protocol — local execution evidence for agents, tools, and systems"
readme = "README.md"
requires-python = ">=3.10"
license = { text = "Apache-2.0" }
authors = [{ name = "Auxo" }]
keywords = ["chp", "capability-host-protocol", "agents", "observability", "governance", "evidence", "replay"]
classifiers = [
    "Development Status :: 3 - Alpha",
    "Intended Audience :: Developers",
    "License :: OSI Approved :: Apache Software License",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Python :: 3.13",
    "Topic :: Software Development :: Libraries :: Python Modules",
    "Topic :: System :: Logging",
    "Topic :: System :: Monitoring",
]
dependencies = []

[project.scripts]
chp = "chp_core.cli:main"

[project.entry-points."chp.adapters"]
chp-git = "chp_core.version_control:GitAdapter"

[project.optional-dependencies]
dev    = ["jsonschema>=4.23", "pytest>=8.0"]
claude = ["anthropic>=0.30"]
openai = ["openai>=1.0"]
gemini = ["google-generativeai>=0.5"]
models = ["anthropic>=0.30", "openai>=1.0", "google-generativeai>=0.5"]

[tool.pytest.ini_options]
testpaths = ["tests"]
pythonpath = ["."]

[tool.hatch.build.targets.wheel]
packages = ["chp_core"]
