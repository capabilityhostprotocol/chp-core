[build-system]
requires = ["hatchling>=1.25"]
build-backend = "hatchling.build"

[project]
name = "chp-adapter-local-llm"
version = "0.8.0"
description = "CHP capability adapter — local LLM inference via Ollama (primary) or llama.cpp (fallback)"
readme = "README.md"
requires-python = ">=3.10"
license = { text = "Apache-2.0" }
authors = [{ name = "Project Auxo, Inc." }]
keywords = ["chp", "capability-host-protocol", "ollama", "llama", "llm", "adapter", "agents"]
classifiers = [
    "Development Status :: 3 - Alpha",
    "Intended Audience :: Developers",
    "License :: OSI Approved :: Apache Software License",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Python :: 3.13",
]
dependencies = [
    "chp-core>=0.7.0",
    "httpx>=0.27",
]

[project.entry-points."chp.adapters"]
local_llm = "chp_adapter_local_llm:LocalLLMAdapter"

[project.optional-dependencies]
dev = ["pytest>=8.0", "pytest-asyncio>=0.23"]

[tool.pytest.ini_options]
testpaths = ["tests"]
pythonpath = ["."]

[tool.hatch.build.targets.wheel]
packages = ["chp_adapter_local_llm"]
