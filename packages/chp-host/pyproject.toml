[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "chp-host"
version = "0.8.2"
description = "CHP multi-host router and config-driven adapter host server"
requires-python = ">=3.11"
dependencies = ["chp-core>=0.7.0", "mcp>=1.0"]

[project.scripts]
chp-host = "chp_host.cli:main"

[tool.pytest.ini_options]
asyncio_mode = "auto"
