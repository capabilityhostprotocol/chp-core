[build-system]
requires = ["hatchling>=1.25"]
build-backend = "hatchling.build"

[project]
name = "chp-adapter-scout"
version = "0.23.0"
description = "CHP capability adapter — FastContext repo scout subagent"
requires-python = ">=3.10"
license = { text = "Apache-2.0" }
authors = [{ name = "Auxo" }]
keywords = ["chp", "capability-host-protocol", "scout", "fastcontext", "agent", "adapter"]
classifiers = [
    "Development Status :: 3 - Alpha",
    "Intended Audience :: Developers",
    "License :: OSI Approved :: Apache Software License",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Python :: 3.13",
]
dependencies = [
    "chp-core>=0.7.0",
]

[project.entry-points."chp.adapters"]
scout = "chp_adapter_scout:ScoutAdapter"

[project.optional-dependencies]
dev = ["pytest>=8.0", "pytest-asyncio>=0.23", "httpx>=0.27"]

[tool.pytest.ini_options]
testpaths = ["tests"]
pythonpath = ["."]
asyncio_mode = "strict"

[tool.hatch.build.targets.wheel]
packages = ["chp_adapter_scout"]
