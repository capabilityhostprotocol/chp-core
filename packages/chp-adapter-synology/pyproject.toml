[build-system]
requires = ["hatchling>=1.25"]
build-backend = "hatchling.build"

[project]
name = "chp-adapter-synology"
version = "0.8.2"
description = "CHP capability adapter — Synology DSM file operations, tasks, and Container Manager"
readme = "README.md"
requires-python = ">=3.10"
license = { text = "Apache-2.0" }
authors = [{ name = "Project Auxo, Inc." }]
keywords = ["chp", "capability-host-protocol", "synology", "dsm", "nas", "adapter", "edge"]
classifiers = [
    "Development Status :: 3 - Alpha",
    "Intended Audience :: Developers",
    "License :: OSI Approved :: Apache Software License",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Python :: 3.13",
]
dependencies = [
    "chp-core>=0.7.0",
    "httpx>=0.27",
]

[project.entry-points."chp.adapters"]
synology = "chp_adapter_synology:SynologyAdapter"

[project.optional-dependencies]
dev = ["pytest>=8.0"]

[tool.pytest.ini_options]
testpaths = ["tests"]
pythonpath = ["."]

[tool.hatch.build.targets.wheel]
packages = ["chp_adapter_synology"]
